# Configurações do WBS Hub
# ========================================

# ========================================
# Wizard Planejamento (novo fluxo)
# ========================================

# Endpoints Make (webhooks)
webhook_pendencia: "https://hook.us1.make.com/cadm9mvhbwuqle4f2pmbos4rals74rqg"
webhook_tasks: "https://hook.us1.make.com/8mi5e7usu77ffp9v2l7enabgp5gbq7uo"

# GET endpoint que retorna lista de pendências do Monday
# Resposta esperada: [{"id": "...", "nome": "...", "os": "...", "subconjunto": "..."}]
webhook_get_pendencias: "https://hook.us1.make.com/ugqsmv6t6g6rm29fmk4xpvsp2sqg4y37"

# Timeout das requisições (segundos)
timeout_pendencia: 30
timeout_tasks: 60

# Feriados nacionais BR — manter atualizado anualmente
# Quando a sexta cai em feriado, a task genérica vai para a SEGUNDA-FEIRA seguinte
feriados_br:
  - "2025-01-01" # Confraternização Universal
  - "2025-04-18" # Sexta-feira da Paixão
  - "2025-04-21" # Tiradentes
  - "2025-05-01" # Dia do Trabalho
  - "2025-06-19" # Corpus Christi
  - "2025-09-07" # Independência do Brasil
  - "2025-10-12" # Nossa Senhora Aparecida
  - "2025-11-02" # Finados
  - "2025-11-15" # Proclamação da República
  - "2025-11-20" # Consciência Negra
  - "2025-12-25" # Natal
  - "2026-01-01" # Confraternização Universal
  - "2026-04-03" # Sexta-feira da Paixão
  - "2026-04-21" # Tiradentes

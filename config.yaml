# ========================================
# LEGADO (fluxo antigo)
# ========================================
# `make_endpoint` era usado no app antigo (1 requisição por tarefa).
# No wizard novo, ele NÃO é utilizado — use `webhook_pendencia` e `webhook_tasks`.
make_endpoint: "https://hook.us1.make.com/owjl4ws1v6aw2jhw84c2k2hytr9qiwkg"

# Configurações de projeto
projeto_default: ""

# Timeout para requisições (segundos)
request_timeout: 30

request_delay: 0.5

# Configurações de UI
ui:
  page_title: "WBS Hub - ARV"
  page_icon: "📋"
  layout: "wide"
